<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Panovia pipeline: project sources to knowledge graph to evidence-cited answers">
  <defs>
    <linearGradient id="pAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6E8BFA"/><stop offset="100%" stop-color="#46C28E"/>
    </linearGradient>
    <pattern id="pGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#6E8BFA" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <clipPath id="pFrame"><rect width="1200" height="330" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#pFrame)" font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
    <rect width="1200" height="330" fill="#0B0E14"/>
    <rect width="1200" height="330" fill="url(#pGrid)"/>
    <rect x="0" y="0" width="1200" height="330" rx="14" stroke="#232A3A"/>

    <text x="36" y="46" font-size="13" letter-spacing="3" fill="#5A6379">HOW&#160;PANOVIA&#160;WORKS</text>
    <line x1="36" y1="58" x2="1164" y2="58" stroke="#232A3A"/>

    <!-- ════ STAGE 1 · PROJECT SOURCES ════ -->
    <g>
      <rect x="46" y="92" width="280" height="176" rx="12" fill="#11151F" stroke="#232A3A"/>
      <text x="66" y="122" font-size="12" letter-spacing="2" fill="#6E8BFA">01&#160;·&#160;PROJECT&#160;SOURCE</text>
      <!-- stacked file cards -->
      <g font-size="12" fill="#C7CDDB">
        <rect x="66" y="138" width="112" height="30" rx="6" fill="#0B0E14" stroke="#39415A"/>
        <text x="80" y="158">model.ifc</text>
        <rect x="78" y="176" width="112" height="30" rx="6" fill="#0B0E14" stroke="#39415A"/>
        <text x="92" y="196">plan.dwg</text>
        <rect x="66" y="214" width="112" height="30" rx="6" fill="#0B0E14" stroke="#39415A"/>
        <text x="80" y="234">spec.pdf</text>
      </g>
      <!-- mini building glyph -->
      <g stroke="#46C28E" stroke-width="1.3" fill="none" stroke-opacity=".8">
        <path d="M232 236 232 172 262 156 292 172 292 236 262 252Z"/>
        <path d="M232 172 262 188 292 172 M262 188 262 252"/>
      </g>
      <text x="66" y="292" font-size="11.5" fill="#5A6379">the real source of truth</text>
    </g>

    <!-- flow 1 → 2 -->
    <path id="flowA" d="M326 180 C380 180 396 180 450 180" stroke="#39415A" stroke-width="1.4" stroke-dasharray="5 6" fill="none"/>
    <circle r="4" fill="#6E8BFA"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#flowA"/></animateMotion></circle>
    <circle r="4" fill="#6E8BFA" opacity=".55"><animateMotion dur="1.8s" begin=".9s" repeatCount="indefinite"><mpath href="#flowA"/></animateMotion></circle>
    <text x="352" y="166" font-size="11" letter-spacing="1.5" fill="#5A6379">EXTRACT</text>

    <!-- ════ STAGE 2 · KNOWLEDGE GRAPH ════ -->
    <g>
      <rect x="450" y="92" width="300" height="176" rx="12" fill="#11151F" stroke="#232A3A"/>
      <text x="470" y="122" font-size="12" letter-spacing="2" fill="#46C28E">02&#160;·&#160;KNOWLEDGE&#160;GRAPH</text>
      <!-- graph -->
      <g stroke="#46C28E" stroke-opacity=".45" stroke-width="1.2">
        <line x1="600" y1="190" x2="518" y2="152"/><line x1="600" y1="190" x2="688" y2="148"/>
        <line x1="600" y1="190" x2="524" y2="236"/><line x1="600" y1="190" x2="682" y2="232"/>
        <line x1="518" y1="152" x2="688" y2="148" stroke-opacity=".2"/>
        <line x1="524" y1="236" x2="682" y2="232" stroke-opacity=".2"/>
      </g>
      <circle cx="600" cy="190" r="11" fill="#0B0E14" stroke="#46C28E" stroke-width="2">
        <animate attributeName="r" values="11;13;11" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <g fill="#0B0E14" stroke="#6E8BFA" stroke-width="1.6">
        <circle cx="518" cy="152" r="7"><animate attributeName="stroke-opacity" values="1;.4;1" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle cx="688" cy="148" r="7"><animate attributeName="stroke-opacity" values="1;.4;1" dur="2.6s" begin=".5s" repeatCount="indefinite"/></circle>
        <circle cx="524" cy="236" r="7"><animate attributeName="stroke-opacity" values="1;.4;1" dur="2.6s" begin="1s" repeatCount="indefinite"/></circle>
        <circle cx="682" cy="232" r="7"><animate attributeName="stroke-opacity" values="1;.4;1" dur="2.6s" begin="1.5s" repeatCount="indefinite"/></circle>
      </g>
      <g font-size="10.5" fill="#8B93A7">
        <text x="500" y="140">wall</text><text x="672" y="136">level</text>
        <text x="504" y="260">system</text><text x="664" y="256">clause</text>
        <text x="580" y="216" fill="#C7CDDB">entity</text>
      </g>
      <text x="470" y="292" font-size="11.5" fill="#5A6379">typed entities · provenance · trust states</text>
    </g>

    <!-- flow 2 → 3 -->
    <path id="flowB" d="M750 180 C804 180 820 180 874 180" stroke="#39415A" stroke-width="1.4" stroke-dasharray="5 6" fill="none"/>
    <circle r="4" fill="#46C28E"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#flowB"/></animateMotion></circle>
    <circle r="4" fill="#46C28E" opacity=".55"><animateMotion dur="1.8s" begin=".9s" repeatCount="indefinite"><mpath href="#flowB"/></animateMotion></circle>
    <text x="778" y="166" font-size="11" letter-spacing="1.5" fill="#5A6379">REASON</text>

    <!-- ════ STAGE 3 · EVIDENCE-CITED ANSWER ════ -->
    <g>
      <rect x="874" y="92" width="290" height="176" rx="12" fill="#11151F" stroke="#232A3A"/>
      <text x="894" y="122" font-size="12" letter-spacing="2" fill="#E8A33D">03&#160;·&#160;CITED&#160;ANSWER</text>
      <!-- chat bubble -->
      <rect x="894" y="138" width="250" height="72" rx="10" fill="#0B0E14" stroke="#39415A"/>
      <g fill="#39415A">
        <rect x="908" y="154" width="190" height="7" rx="3.5" fill="#4A5570"/>
        <rect x="908" y="169" width="222" height="7" rx="3.5"/>
        <rect x="908" y="184" width="150" height="7" rx="3.5"/>
      </g>
      <!-- citation chips -->
      <g font-size="10.5">
        <rect x="894" y="222" width="118" height="24" rx="12" fill="#0B0E14" stroke="#46C28E"/>
        <text x="908" y="238" fill="#46C28E">» model.ifc&#160;·&#160;L3</text>
        <rect x="1020" y="222" width="108" height="24" rx="12" fill="#0B0E14" stroke="#6E8BFA">
          <animate attributeName="stroke-opacity" values="1;.4;1" dur="2s" repeatCount="indefinite"/>
        </rect>
        <text x="1034" y="238" fill="#6E8BFA">» spec&#160;4.2.1</text>
      </g>
      <text x="894" y="292" font-size="11.5" fill="#5A6379">traceable to source — no guesses</text>
    </g>

    <rect x="0" y="324" width="1200" height="6" fill="url(#pAccent)"/>
  </g>
</svg>
