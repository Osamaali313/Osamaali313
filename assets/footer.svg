<svg width="1200" height="150" viewBox="0 0 1200 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reading the model, not the export. Let's build.">
  <defs>
    <linearGradient id="fAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#46C28E"/><stop offset="100%" stop-color="#6E8BFA"/>
    </linearGradient>
    <pattern id="fGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#6E8BFA" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <clipPath id="fFrame"><rect width="1200" height="150" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#fFrame)">
    <rect width="1200" height="150" fill="#0B0E14"/>
    <rect width="1200" height="150" fill="url(#fGrid)"/>
    <rect x="0" y="0" width="1200" height="6" fill="url(#fAcc)"/>
    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" text-anchor="middle">
      <text x="600" y="72" font-size="22" fill="#F3F5FA" letter-spacing="1">reading&#160;the&#160;model,&#160;not&#160;the&#160;export.</text>
      <text x="600" y="104" font-size="13" fill="#5A6379" letter-spacing="4">LET'S&#160;BUILD</text>
    </g>
    <rect x="480" y="84" width="240" height="2" fill="url(#fAcc)">
      <animate attributeName="width" values="0;240" dur="1.4s" fill="freeze"/>
      <animate attributeName="x" values="600;480" dur="1.4s" fill="freeze"/>
    </rect>
    <circle cx="600" cy="130" r="3.5" fill="#46C28E">
      <animate attributeName="opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <rect x="0" y="0" width="1200" height="150" rx="14" stroke="#232A3A" fill="none"/>
  </g>
</svg>